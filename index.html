<style>
  .container {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .box-purple {
    width: 120px;
    height: 120px;
    background-color: purple;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: sans-serif;
    font-size: 0; 
    transition: transform 2s, font-size 0.3s;
  }

  .box-purple:hover {
    transform: translateX(200px);
    font-size: 16px;
  }
  .linear   { transition-timing-function: linear; }
  .ease     { transition-timing-function: ease; }
  .ease-in  { transition-timing-function: ease-in; }
  .ease-out { transition-timing-function: ease-out; }
</style>

<div class="container">
  <div class="box-purple linear">linear</div>
  <div class="box-purple ease">ease</div>
  <div class="box-purple ease-in">ease-in</div>
  <div class="box-purple ease-out">ease-out</div>
</div>
